version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - unused
    - misspell
  settings:
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck]

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/argus-5g/argus
