version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - unused
    - misspell

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/argus-5g/argus

issues:
  exclude-rules:
    - path: _test.go
      linters: [errcheck]
