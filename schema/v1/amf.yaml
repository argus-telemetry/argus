namespace: argus.5g.amf
nf_type: AMF
schema_version: v1
spec: "3GPP TS 28.552"

kpis:
  - name: registration.attempt_count
    description: Total number of UE registration attempts received by the AMF
    unit: count
    spec_ref: "3GPP TS 28.552 §5.1.1.1"
    derived: false

  - name: registration.failure_count
    description: Total number of UE registration failures (rejects sent by AMF)
    unit: count
    spec_ref: "3GPP TS 28.552 §5.1.1.2"
    derived: false

  - name: registration.success_rate
    description: Ratio of successful registrations to total registration attempts
    unit: ratio
    spec_ref: "3GPP TS 28.552 §5.1.1.3"
    derived: true
    formula: "registration.attempt_count > 0 ? (registration.attempt_count - registration.failure_count) / registration.attempt_count : 0"
    depends_on:
      - registration.attempt_count
      - registration.failure_count

  - name: deregistration.count
    description: Total number of UE-initiated deregistration requests
    unit: count
    spec_ref: "3GPP TS 28.552 §5.1.1.4"
    derived: false

  - name: handover.attempt_count
    description: Total number of inter-AMF or Xn/N2 handover attempts
    unit: count
    spec_ref: "3GPP TS 28.552 §5.1.1.6.1"
    derived: false

  - name: handover.success_count
    description: Total number of successfully completed handovers
    unit: count
    spec_ref: "3GPP TS 28.552 §5.1.1.6.2"
    derived: false

  - name: handover.success_rate
    description: Ratio of successful handovers to total handover attempts
    unit: ratio
    spec_ref: "3GPP TS 28.552 §5.1.1.6"
    derived: true
    formula: "handover.attempt_count > 0 ? handover.success_count / handover.attempt_count : 0"
    depends_on:
      - handover.attempt_count
      - handover.success_count

  - name: ue.connected_count
    description: Current number of UEs in CM-CONNECTED state
    unit: count
    spec_ref: "3GPP TS 28.552 §5.1.1.8"
    derived: false

mappings:
  free5gc:
    source_protocol: prometheus
    metrics:
      registration.attempt_count:
        prometheus_metric: free5gc_nas_msg_received_total
        labels:
          name: RegistrationRequest
        type: counter
        reset_aware: true
        label_match_strategy: sum_by
      registration.failure_count:
        prometheus_metric: free5gc_nas_nas_msg_sent_total
        labels:
          name: RegistrationReject
        type: counter
        reset_aware: true
        label_match_strategy: sum_by
      deregistration.count:
        prometheus_metric: free5gc_nas_msg_received_total
        labels:
          name: DeregistrationRequestUEOriginatingDeregistration
        type: counter
        reset_aware: true
        label_match_strategy: sum_by
      ue.connected_count:
        prometheus_metric: free5gc_amf_business_ue_connectivity
        labels: {}
        type: gauge
        reset_aware: false
        label_match_strategy: sum_by
      # handover.attempt_count: free5gc v4.2.0 exposes handover_current_count (gauge by type),
      #   not event counters. No attempt/success semantics available.
      # handover.success_count: same — not available.

  open5gs:
    source_protocol: prometheus
    metrics:
      registration.attempt_count:
        prometheus_metric: open5gs_amf_registration_total
        labels:
          status: attempted
        type: counter
        reset_aware: true
        label_match_strategy: exact
      registration.failure_count:
        prometheus_metric: open5gs_amf_registration_total
        labels:
          status: failed
        type: counter
        reset_aware: true
        label_match_strategy: exact
      deregistration.count:
        prometheus_metric: open5gs_amf_deregistration_total
        labels: {}
        type: counter
        reset_aware: true
        label_match_strategy: exact
      ue.connected_count:
        prometheus_metric: open5gs_amf_ue_connected
        labels: {}
        type: gauge
        reset_aware: false
        label_match_strategy: exact
      handover.attempt_count:
        prometheus_metric: open5gs_amf_handover_total
        labels:
          result: attempted
        type: counter
        reset_aware: true
        label_match_strategy: exact
      handover.success_count:
        prometheus_metric: open5gs_amf_handover_total
        labels:
          result: successful
        type: counter
        reset_aware: true
        label_match_strategy: exact

  # DSL-based vendor mapping example for community contributors.
  # Nokia ENM uses hierarchical PM counter paths with variable segments.
  # This mapping does NOT connect to a real Nokia system — it demonstrates
  # the source_template DSL for contributors adding their vendor.
  nokia_enm:
    source_protocol: prometheus
    metrics:
      registration.attempt_count:
        source_template: "/pm/stats/{{.NF}}/reg/{{.Instance}}/attempts"
        transform: "rate(30s)"
        type: counter
        reset_aware: true
        label_match_strategy: exact
        label_extract:
          - segment: 4
            label: instance_id
      registration.failure_count:
        source_template: "/pm/stats/{{.NF}}/reg/{{.Instance}}/failures"
        transform: "rate(30s)"
        type: counter
        reset_aware: true
        label_match_strategy: exact
        label_extract:
          - segment: 4
            label: instance_id
      ue.connected_count:
        source_template: "/pm/stats/{{.NF}}/ue/{{.Instance}}/connected"
        type: gauge
        reset_aware: false
        label_match_strategy: exact
        label_extract:
          - segment: 4
            label: instance_id
