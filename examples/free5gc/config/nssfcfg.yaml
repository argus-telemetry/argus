info:
  version: 1.0.2
  description: NSSF config

configuration:
  nssfName: NSSF
  sbi:
    scheme: http
    registerIPv4: 10.100.200.17
    bindingIPv4: 10.100.200.17
    port: 8000
    tls:
      pem: cert/nssf.pem
      key: cert/nssf.key
  serviceNameList:
    - nnssf-nsselection
    - nnssf-nssaiavailability
  nrfUri: http://10.100.200.10:8000
  nrfCertPem: cert/nrf.pem
  supportedPlmnList:
    - mcc: 208
      mnc: 93
  supportedNssaiInPlmnList:
    - plmnId:
        mcc: 208
        mnc: 93
      supportedSnssaiList:
        - sst: 1
          sd: 010203
  nsiList:
    - snssai:
        sst: 1
        sd: 010203
      nsiInformationList:
        - nrfId: http://10.100.200.10:8000/nnrf-nfm/v1/nf-instances
          nsiId: 1

logger:
  enable: true
  level: info
  reportCaller: false
