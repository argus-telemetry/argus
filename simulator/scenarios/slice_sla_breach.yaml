name: slice_sla_breach
description: PDU session spike and UE connectivity drop simulating slice SLA breach at 90s
duration: 300

nfs:
  - type: AMF
    vendor: free5gc
    instance_id: amf-001
    protocol: prometheus
    port: 9090
    metrics:
      - name: free5gc_amf_business_active_pdu_session_current_count
        type: gauge
        baseline: 480
        jitter: 30
      - name: free5gc_amf_business_ue_connectivity
        type: gauge
        baseline: 950
        jitter: 50
    events:
      - name: session_spike
        start_sec: 90
        duration_sec: 60
        metric: free5gc_amf_business_active_pdu_session_current_count
        override: 50
      - name: ue_drop
        start_sec: 90
        duration_sec: 60
        metric: free5gc_amf_business_ue_connectivity
        override: 200
