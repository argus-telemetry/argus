name: slice_sla_breach
description: UPF throughput drop simulating slice SLA breach at 90s
duration: 300

nfs:
  - type: UPF
    vendor: free5gc
    instance_id: upf-001
    protocol: prometheus
    port: 9092
    metrics:
      - name: upf_throughput_bps
        labels: {direction: uplink}
        type: gauge
        baseline: 500000000
        jitter: 50000000
      - name: upf_throughput_bps
        labels: {direction: downlink}
        type: gauge
        baseline: 2000000000
        jitter: 200000000
      - name: upf_user_plane_latency_ms
        type: gauge
        baseline: 1.2
        jitter: 0.3
    events:
      - name: throughput_drop
        start_sec: 90
        duration_sec: 60
        metric: upf_throughput_bps
        override: 100000000
      - name: latency_spike
        start_sec: 90
        duration_sec: 60
        metric: upf_user_plane_latency_ms
        override: 50
