replicaCount: 1

image:
  repository: ghcr.io/argus-5g/argus
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

schemaDir: /etc/argus/schema/v1

store:
  # type: memory | bbolt | redis
  # bbolt is the default — operators choose redis explicitly for multi-worker.
  type: bbolt
  bbolt:
    path: /data/counters.db
    size: 1Gi
  redis:
    addr: "redis:6379"
    password: ""       # from Secret: use store.redis.existingSecret
    db: 0
    keyTTL: 120s
    dialTimeout: 5s
    readTimeout: 3s
    writeTimeout: 3s
    poolSize: 10       # one per normalizer goroutine

normalizer:
  # worker_count should match HPA maxReplicas to avoid hash routing cross-pod.
  workerCount: 1
  queueDepth: 256

collectors: []
  # - name: free5gc-amf
  #   endpoint: "http://amf:9091"
  #   interval: 15s

output:
  prometheus:
    listen: ":8080"
  otlp:
    enabled: false
    endpoint: ""
    insecure: true

correlator:
  enabled: true
  windowSize: 30s
  evalInterval: 5s

serviceMonitor:
  enabled: false
  interval: 15s
  labels: {}

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Pods
      pods:
        metric:
          name: argus_normalizer_worker_queue_depth
        target:
          type: AverageValue
          averageValue: "200"

keda:
  enabled: false
  # ScaledObject config — requires KEDA operator.
  # pollingInterval: 15
  # cooldownPeriod: 60
  # triggers:
  #   - type: prometheus
  #     metadata:
  #       serverAddress: http://prometheus:9090
  #       query: avg(argus_normalizer_worker_queue_depth)
  #       threshold: "200"

grafana:
  dashboard:
    enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
