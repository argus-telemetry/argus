apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argus.fullname" . }}
  labels:
    {{- include "argus.labels" . | nindent 4 }}
data:
  argus.yaml: |
    schema_dir: {{ .Values.schemaDir }}
    store:
      type: {{ .Values.store.type }}
      {{- if eq .Values.store.type "bbolt" }}
      bbolt:
        path: {{ .Values.store.bbolt.path }}
      {{- end }}
      {{- if eq .Values.store.type "redis" }}
      redis:
        addr: {{ .Values.store.redis.addr | quote }}
        password: {{ .Values.store.redis.password | quote }}
        db: {{ .Values.store.redis.db }}
        key_ttl: {{ .Values.store.redis.keyTTL }}
        dial_timeout: {{ .Values.store.redis.dialTimeout }}
        read_timeout: {{ .Values.store.redis.readTimeout }}
        write_timeout: {{ .Values.store.redis.writeTimeout }}
        pool_size: {{ .Values.store.redis.poolSize }}
      {{- end }}
    normalizer:
      worker_count: {{ .Values.normalizer.workerCount }}
      queue_depth: {{ .Values.normalizer.queueDepth }}
    collectors:
    {{- range .Values.collectors }}
      - name: {{ .name }}
        endpoint: {{ .endpoint | quote }}
        interval: {{ .interval }}
    {{- end }}
    output:
      prometheus:
        listen: {{ .Values.output.prometheus.listen | quote }}
      {{- if .Values.output.otlp.enabled }}
      otlp:
        endpoint: {{ .Values.output.otlp.endpoint | quote }}
        insecure: {{ .Values.output.otlp.insecure }}
      {{- end }}
    {{- if .Values.correlator.enabled }}
    correlator:
      window_size: {{ .Values.correlator.windowSize }}
      eval_interval: {{ .Values.correlator.evalInterval }}
    {{- end }}
