{{- if .Values.scenarios }}
{{- if .Values.scenarios.files }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argus.fullname" . }}-scenarios
  labels:
    {{- include "argus.labels" . | nindent 4 }}
data:
  {{- range .Values.scenarios.files }}
  {{ . }}: |
    {{- $.Files.Get (printf "files/scenarios/%s" .) | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
